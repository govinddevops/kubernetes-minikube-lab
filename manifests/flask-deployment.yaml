apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask
  template:
    metadata:
      labels:
        app: flask
    spec:
      containers:
      - name: flask-container
        image: tiangolo/uwsgi-nginx-flask:python3.9
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: flask-config
        - secretRef:
            name: flask-secret
